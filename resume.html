<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resume | Erica Manyama</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0d1b2a;
color:white;
}
/* STAR BACKGROUND */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
opacity:0.2;
z-index:-1;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#c084fc;
}

nav ul{
display:flex;
list-style:none;
gap:30px;
}

nav ul li a{
text-decoration:none;
color:white;
}

nav ul li a:hover{
color:#c084fc;
}

/* RESUME SECTION */

.resume-container{
text-align:center;
padding:80px 20px;
}

.resume-container h1{
font-size:40px;
margin-bottom:20px;
}

/* BUTTON */

.download-btn{
display:inline-block;
padding:12px 25px;
background:#c084fc;
color:white;
text-decoration:none;
border-radius:6px;
margin-bottom:40px;
}

.download-btn:hover{
background:#a855f7;
}

/* PDF VIEWER */

.resume-viewer{
width:80%;
height:700px;
border:none;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
border-top:1px solid #333;
margin-top:60px;
color:#aaa;
}
/* LIGHT MODE */

.light-mode{
background:#ffffff;
color:#000000;
}

.light-mode nav ul li a{
color:#000000;
}

.light-mode footer{
color:#555;
}

.light-mode body::before{
display:none;
}

</style>

</head>

<body>

<nav>

<div class="logo">EM.</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="skills.html">Skills</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="certifications.html">Certifications</a></li>
<li><a href="resume.html">Resume</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
<button id="theme-toggle">🌙</button>

</nav>

<section class="resume-container">

<h1>My Resume</h1>

<a class="download-btn" href="resume.pdf" download>
Download Resume
</a>

<br>

<iframe class="resume-viewer" src="resume.pdf"></iframe>

</section>

<footer>

© 2026 Erica Manyama | Data Analyst Portfolio

</footer>
<script>

const toggle = document.getElementById("theme-toggle");

toggle.addEventListener("click", function(){
document.body.classList.toggle("light-mode");
});

</script>

</body>

</html>
